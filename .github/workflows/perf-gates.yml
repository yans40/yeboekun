name: Perf Gates

on:
  pull_request:
    branches: [dev, main]
    paths:
      - 'frontend/**'

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Vérifie la taille du bundle gzip (seuil Lot 1 = 180 kB)
        run: |
          BUNDLE_FILE=$(ls dist/assets/index-*.js 2>/dev/null | head -1)
          if [ -z "$BUNDLE_FILE" ]; then
            echo "::error::Aucun fichier dist/assets/index-*.js trouvé"
            exit 1
          fi
          GZIP_BYTES=$(gzip -c "$BUNDLE_FILE" | wc -c | tr -d ' ')
          GZIP_KB=$((GZIP_BYTES / 1024))
          THRESHOLD_KB=180
          echo "Bundle gzip : ${GZIP_KB} kB (seuil Lot 1 : ${THRESHOLD_KB} kB)"
          if [ "$GZIP_KB" -gt "$THRESHOLD_KB" ]; then
            echo "::error::Bundle gzip ${GZIP_KB} kB > seuil ${THRESHOLD_KB} kB"
            exit 1
          fi

  lighthouse:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Démarre vite preview
        run: |
          npx vite preview --port 4173 &
          sleep 5
      - name: Lighthouse audit
        run: |
          npx --yes lighthouse http://localhost:4173 \
            --output json \
            --output-path /tmp/lh.json \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --only-categories=performance,accessibility,best-practices,seo \
            --quiet
      - name: Vérifie les seuils contractuels (Lot 1)
        run: |
          PERF=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('/tmp/lh.json')).categories.performance.score*100))")
          A11Y=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('/tmp/lh.json')).categories.accessibility.score*100))")
          BP=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('/tmp/lh.json')).categories['best-practices'].score*100))")
          SEO=$(node -e "console.log(Math.round(JSON.parse(require('fs').readFileSync('/tmp/lh.json')).categories.seo.score*100))")
          echo "Perf=$PERF | A11y=$A11Y | BP=$BP | SEO=$SEO"
          # Seuils Lot 1 (cf docs/qa/BASELINE.md)
          [ "$PERF" -ge 90 ] || { echo "::error::Perf $PERF < 90"; exit 1; }
          [ "$A11Y" -ge 95 ] || { echo "::error::A11y $A11Y < 95"; exit 1; }
          [ "$BP"   -ge 96 ] || { echo "::error::Best Practices $BP < 96"; exit 1; }
          [ "$SEO"  -ge 90 ] || { echo "::error::SEO $SEO < 90"; exit 1; }
