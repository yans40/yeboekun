name: Require QA Label

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled, ready_for_review]
    branches: [dev, main]

jobs:
  check-label:
    runs-on: ubuntu-latest
    steps:
      - name: Le label qa-validated doit être présent
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('qa-validated')) {
              core.setFailed(
                "Label 'qa-validated' manquant. Iris (Claude Code) ou Alma (Cursor) doit valider la PR avant merge."
              );
            } else {
              core.info("Label qa-validated présent — gate OK.");
            }
