<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>GegeDot — Wireframes</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&family=Caveat:wght@400;600&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; font-family: 'Geist', system-ui, sans-serif; }
  body { background: #f0eee9; }
  /* Wireframe primitives — all components inherit these */
  :root {
    --ink: #1a1a1f;
    --ink-2: #44424a;
    --ink-3: #807e88;
    --ink-4: #b9b6bd;
    --paper: #f8f5f0;
    --paper-2: #efebe3;
    --line: #c9c4ba;
    --line-2: #ddd9d0;
    --accent: #b8593a;        /* sépia */
    --accent-2: #6b7c5a;      /* mousse */
    --accent-cool: #4a5a78;   /* fraîche option */
    --note: #f4d77a;
    --font-serif: 'Fraunces', 'Cormorant Garamond', Georgia, serif;
    --font-sans: 'Geist', 'Inter', system-ui, sans-serif;
    --font-mono: 'Geist Mono', 'JetBrains Mono', monospace;
    --font-hand: 'Caveat', cursive;
  }
  * { box-sizing: border-box; }

  /* Wireframe component classes used by all artboards */
  .wf { font-family: var(--font-sans); color: var(--ink); background: var(--paper); width: 100%; height: 100%; overflow: hidden; position: relative; }
  .wf-mono { font-family: var(--font-mono); }
  .wf-serif { font-family: var(--font-serif); }
  .wf-hand  { font-family: var(--font-hand); color: var(--accent); }

  /* generic placeholder — striped diagonal */
  .wf-ph {
    background: repeating-linear-gradient(135deg,
      var(--line-2) 0 6px, transparent 6px 12px);
    border: 1px solid var(--line);
    color: var(--ink-3);
    font-family: var(--font-mono);
    font-size: 10px;
    display: flex; align-items: center; justify-content: center;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .wf-ph.dark { background: repeating-linear-gradient(135deg,
      rgba(255,255,255,.06) 0 6px, transparent 6px 12px);
    border-color: rgba(255,255,255,.18);
    color: rgba(255,255,255,.55); }

  /* annotation pill (handwritten arrow note) */
  .wf-anno {
    position: absolute;
    font-family: var(--font-hand);
    color: var(--accent);
    font-size: 17px;
    line-height: 1.1;
    pointer-events: none;
    max-width: 220px;
  }
  .wf-anno::before {
    content: ""; position: absolute;
    border-top: 1px dashed var(--accent);
    transform-origin: 0 0;
  }

  /* sidebar/topbar/buttons — wireframe primitives */
  .wf-side {
    width: 56px; height: 100%; background: var(--paper-2);
    border-right: 1px solid var(--line); display: flex; flex-direction: column;
    align-items: center; padding: 14px 0; gap: 4px;
  }
  .wf-side .ico { width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-2); font-family: var(--font-mono); font-size: 11px;
    border: 1px solid transparent; }
  .wf-side .ico.active { background: var(--paper); border-color: var(--line); color: var(--ink); }
  .wf-side .logo { font-family: var(--font-serif); font-weight: 500;
    color: var(--ink); font-size: 18px; margin-bottom: 18px; line-height: 1; }

  .wf-top { height: 44px; border-bottom: 1px solid var(--line);
    display: flex; align-items: center; padding: 0 14px; gap: 12px;
    background: var(--paper); }
  .wf-top .tree-pick { font-family: var(--font-serif); font-size: 13px; color: var(--ink); }
  .wf-top .search { flex: 1; max-width: 360px; height: 26px;
    border: 1px solid var(--line); border-radius: 13px;
    display: flex; align-items: center; padding: 0 10px; gap: 6px;
    color: var(--ink-3); font-size: 11px; background: var(--paper-2); }
  .wf-top .kbd { margin-left: auto; font-family: var(--font-mono); font-size: 10px;
    border: 1px solid var(--line); padding: 1px 5px; border-radius: 3px;
    color: var(--ink-3); }
  .wf-top .avatar { width: 26px; height: 26px; border-radius: 50%;
    background: var(--paper-2); border: 1px solid var(--line);
    margin-left: auto; font-family: var(--font-mono); font-size: 10px;
    display: flex; align-items: center; justify-content: center; color: var(--ink-3); }

  .wf-h { font-family: var(--font-serif); font-weight: 400; }
  .wf-eyebrow { font-family: var(--font-mono); font-size: 9px;
    text-transform: uppercase; letter-spacing: .12em; color: var(--ink-3); }
  .wf-divider { height: 1px; background: var(--line-2); }

  .wf-btn { font-family: var(--font-sans); font-size: 11px;
    border: 1px solid var(--line); background: var(--paper);
    padding: 4px 10px; border-radius: 5px; color: var(--ink); }
  .wf-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .wf-btn.ghost { border: none; background: transparent; color: var(--ink-2); }
  .wf-tag { display: inline-flex; align-items: center; gap: 4px;
    font-family: var(--font-mono); font-size: 9px; padding: 1px 6px;
    border-radius: 9px; border: 1px solid var(--line); color: var(--ink-2);
    background: var(--paper); text-transform: uppercase; letter-spacing: .08em; }
  .wf-tag.warn { color: var(--accent); border-color: var(--accent); }
  .wf-tag.cool { color: var(--accent-cool); border-color: var(--accent-cool); }
  .wf-tag.solid { background: var(--ink); color: var(--paper); border-color: var(--ink); }

  /* arrow utilities for annotations */
  .arr { position: absolute; width: 30px; height: 1px;
    background: linear-gradient(to right, var(--accent), var(--accent));
    transform-origin: 0 50%; }
  .arr::after { content: ""; position: absolute; right: -1px; top: -3px;
    width: 0; height: 0; border-left: 6px solid var(--accent);
    border-top: 3px solid transparent; border-bottom: 3px solid transparent; }

  /* dark variant */
  .wf.dark {
    --ink: #e8e6e1; --ink-2: #b8b6b1; --ink-3: #807e7a;
    --ink-4: #4a4845; --paper: #16161a; --paper-2: #1f1f24;
    --line: #2c2c34; --line-2: #232328;
  }
  .wf.cool {
    --accent: #4a5a78; --accent-2: #7d8ba3;
    --paper: #f3f3f1; --paper-2: #ebebe7;
  }

  /* scrollbar hide inside artboards */
  .wf *::-webkit-scrollbar { display: none; }
  .wf * { scrollbar-width: none; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" data-file="design-canvas.jsx">

// DesignCanvas.jsx — Figma-ish design canvas wrapper
// Warm gray grid bg + Sections + Artboards + PostIt notes.
// Artboards are reorderable (grip-drag), labels/titles are inline-editable,
// and any artboard can be opened in a fullscreen focus overlay (←/→/Esc).
// State persists to a .design-canvas.state.json sidecar via the host
// bridge. No assets, no deps.
//
// Usage:
//   <DesignCanvas>
//     <DCSection id="onboarding" title="Onboarding" subtitle="First-run variants">
//       <DCArtboard id="a" label="A · Dusk" width={260} height={480}>…</DCArtboard>
//       <DCArtboard id="b" label="B · Minimal" width={260} height={480}>…</DCArtboard>
//     </DCSection>
//   </DesignCanvas>

const DC = {
  bg: '#f0eee9',
  grid: 'rgba(0,0,0,0.06)',
  label: 'rgba(60,50,40,0.7)',
  title: 'rgba(40,30,20,0.85)',
  subtitle: 'rgba(60,50,40,0.6)',
  postitBg: '#fef4a8',
  postitText: '#5a4a2a',
  font: '-apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif',
};

// One-time CSS injection (classes are dc-prefixed so they don't collide with
// the hosted design's own styles).
if (typeof document !== 'undefined' && !document.getElementById('dc-styles')) {
  const s = document.createElement('style');
  s.id = 'dc-styles';
  s.textContent = [
    '.dc-editable{cursor:text;outline:none;white-space:nowrap;border-radius:3px;padding:0 2px;margin:0 -2px}',
    '.dc-editable:focus{background:#fff;box-shadow:0 0 0 1.5px #c96442}',
    '[data-dc-slot]{transition:transform .18s cubic-bezier(.2,.7,.3,1)}',
    '[data-dc-slot].dc-dragging{transition:none;z-index:10;pointer-events:none}',
    '[data-dc-slot].dc-dragging .dc-card{box-shadow:0 12px 40px rgba(0,0,0,.25),0 0 0 2px #c96442;transform:scale(1.02)}',
    '.dc-card{transition:box-shadow .15s,transform .15s}',
    '.dc-card *{scrollbar-width:none}',
    '.dc-card *::-webkit-scrollbar{display:none}',
    '.dc-labelrow{display:flex;align-items:center;gap:4px;height:24px}',
    '.dc-grip{cursor:grab;display:flex;align-items:center;padding:5px 4px;border-radius:4px;transition:background .12s}',
    '.dc-grip:hover{background:rgba(0,0,0,.08)}',
    '.dc-grip:active{cursor:grabbing}',
    '.dc-labeltext{cursor:pointer;border-radius:4px;padding:3px 6px;display:flex;align-items:center;transition:background .12s}',
    '.dc-labeltext:hover{background:rgba(0,0,0,.05)}',
    '.dc-expand{position:absolute;bottom:100%;right:0;margin-bottom:5px;z-index:2;opacity:0;transition:opacity .12s,background .12s;',
    '  width:22px;height:22px;border-radius:5px;border:none;cursor:pointer;padding:0;',
    '  background:transparent;color:rgba(60,50,40,.7);display:flex;align-items:center;justify-content:center}',
    '.dc-expand:hover{background:rgba(0,0,0,.06);color:#2a251f}',
    '[data-dc-slot]:hover .dc-expand{opacity:1}',
  ].join('\n');
  document.head.appendChild(s);
}

const DCCtx = React.createContext(null);

// ─────────────────────────────────────────────────────────────
// DesignCanvas — stateful wrapper around the pan/zoom viewport.
// Owns runtime state (per-section order, renamed titles/labels, focused
// artboard). Order/titles/labels persist to a .design-canvas.state.json
// sidecar next to the HTML. Reads go via plain fetch() so the saved
// arrangement is visible anywhere the HTML + sidecar are served together
// (omelette preview, direct link, downloaded zip). Writes go through the
// host's window.omelette bridge — editing requires the omelette runtime.
// Focus is ephemeral.
// ─────────────────────────────────────────────────────────────
const DC_STATE_FILE = '.design-canvas.state.json';

function DesignCanvas({ children, minScale, maxScale, style }) {
  const [state, setState] = React.useState({ sections: {}, focus: null });
  // Hold rendering until the sidecar read settles so the saved order/titles
  // appear on first paint (no source-order flash). didRead gates writes until
  // the read settles so the empty initial state can't clobber a slow read;
  // skipNextWrite suppresses the one echo-write that would otherwise follow
  // hydration.
  const [ready, setReady] = React.useState(false);
  const didRead = React.useRef(false);
  const skipNextWrite = React.useRef(false);

  React.useEffect(() => {
    let off = false;
    fetch('./' + DC_STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((saved) => {
        if (off || !saved || !saved.sections) return;
        skipNextWrite.current = true;
        setState((s) => ({ ...s, sections: saved.sections }));
      })
      .catch(() => {})
      .finally(() => { didRead.current = true; if (!off) setReady(true); });
    const t = setTimeout(() => { if (!off) setReady(true); }, 150);
    return () => { off = true; clearTimeout(t); };
  }, []);

  React.useEffect(() => {
    if (!didRead.current) return;
    if (skipNextWrite.current) { skipNextWrite.current = false; return; }
    const t = setTimeout(() => {
      window.omelette?.writeFile(DC_STATE_FILE, JSON.stringify({ sections: state.sections })).catch(() => {});
    }, 250);
    return () => clearTimeout(t);
  }, [state.sections]);

  // Build registries synchronously from children so FocusOverlay can read
  // them in the same render. Only direct DCSection > DCArtboard children are
  // walked — wrapping them in other elements opts out of focus/reorder.
  const registry = {};     // slotId -> { sectionId, artboard }
  const sectionMeta = {};  // sectionId -> { title, subtitle, slotIds[] }
  const sectionOrder = [];
  React.Children.forEach(children, (sec) => {
    if (!sec || sec.type !== DCSection) return;
    const sid = sec.props.id ?? sec.props.title;
    if (!sid) return;
    sectionOrder.push(sid);
    const persisted = state.sections[sid] || {};
    const srcIds = [];
    React.Children.forEach(sec.props.children, (ab) => {
      if (!ab || ab.type !== DCArtboard) return;
      const aid = ab.props.id ?? ab.props.label;
      if (!aid) return;
      registry[`${sid}/${aid}`] = { sectionId: sid, artboard: ab };
      srcIds.push(aid);
    });
    const kept = (persisted.order || []).filter((k) => srcIds.includes(k));
    sectionMeta[sid] = {
      title: persisted.title ?? sec.props.title,
      subtitle: sec.props.subtitle,
      slotIds: [...kept, ...srcIds.filter((k) => !kept.includes(k))],
    };
  });

  const api = React.useMemo(() => ({
    state,
    section: (id) => state.sections[id] || {},
    patchSection: (id, p) => setState((s) => ({
      ...s,
      sections: { ...s.sections, [id]: { ...s.sections[id], ...(typeof p === 'function' ? p(s.sections[id] || {}) : p) } },
    })),
    setFocus: (slotId) => setState((s) => ({ ...s, focus: slotId })),
  }), [state]);

  // Esc exits focus; any outside pointerdown commits an in-progress rename.
  React.useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') api.setFocus(null); };
    const onPd = (e) => {
      const ae = document.activeElement;
      if (ae && ae.isContentEditable && !ae.contains(e.target)) ae.blur();
    };
    document.addEventListener('keydown', onKey);
    document.addEventListener('pointerdown', onPd, true);
    return () => {
      document.removeEventListener('keydown', onKey);
      document.removeEventListener('pointerdown', onPd, true);
    };
  }, [api]);

  return (
    <DCCtx.Provider value={api}>
      <DCViewport minScale={minScale} maxScale={maxScale} style={style}>{ready && children}</DCViewport>
      {state.focus && registry[state.focus] && (
        <DCFocusOverlay entry={registry[state.focus]} sectionMeta={sectionMeta} sectionOrder={sectionOrder} />
      )}
    </DCCtx.Provider>
  );
}

// ─────────────────────────────────────────────────────────────
// DCViewport — transform-based pan/zoom (internal)
//
// Input mapping (Figma-style):
//   • trackpad pinch  → zoom   (ctrlKey wheel; Safari gesture* events)
//   • trackpad scroll → pan    (two-finger)
//   • mouse wheel     → zoom   (notched; distinguished from trackpad scroll)
//   • middle-drag / primary-drag-on-bg → pan
//
// Transform state lives in a ref and is written straight to the DOM
// (translate3d + will-change) so wheel ticks don't go through React —
// keeps pans at 60fps on dense canvases.
// ─────────────────────────────────────────────────────────────
function DCViewport({ children, minScale = 0.1, maxScale = 8, style = {} }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });

  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px, ${y}px, 0) scale(${scale})`;
  }, []);

  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;

    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(maxScale, Math.max(minScale, t.scale * factor));
      const k = next / t.scale;
      // keep the world point under the cursor fixed
      t.x = px - (px - t.x) * k;
      t.y = py - (py - t.y) * k;
      t.scale = next;
      apply();
    };

    // Mouse-wheel vs trackpad-scroll heuristic. A physical wheel sends
    // line-mode deltas (Firefox) or large integer pixel deltas with no X
    // component (Chrome/Safari, typically multiples of 100/120). Trackpad
    // two-finger scroll sends small/fractional pixel deltas, often with
    // non-zero deltaX. ctrlKey is set by the browser for trackpad pinch.
    const isMouseWheel = (e) =>
      e.deltaMode !== 0 ||
      (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40);

    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return; // Safari: gesture* owns the pinch — discard concurrent wheels
      if (e.ctrlKey) {
        // trackpad pinch (or explicit ctrl+wheel)
        zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
      } else if (isMouseWheel(e)) {
        // notched mouse wheel — fixed-ratio step per click
        zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18));
      } else {
        // trackpad two-finger scroll — pan
        tf.current.x -= e.deltaX;
        tf.current.y -= e.deltaY;
        apply();
      }
    };

    // Safari sends native gesture* events for trackpad pinch with a smooth
    // e.scale; preferring these over the ctrl+wheel fallback gives a much
    // better feel there. No-ops on other browsers. Safari also fires
    // ctrlKey wheel events during the same pinch — isGesturing makes
    // onWheel drop those entirely so they neither zoom nor pan.
    let gsBase = 1;
    let isGesturing = false;
    const onGestureStart = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGestureChange = (e) => {
      e.preventDefault();
      zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale);
    };
    const onGestureEnd = (e) => { e.preventDefault(); isGesturing = false; };

    // Drag-pan: middle button anywhere, or primary button on canvas
    // background (anything that isn't an artboard or an inline editor).
    let drag = null;
    const onPointerDown = (e) => {
      const onBg = !e.target.closest('[data-dc-slot], .dc-editable');
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault();
      vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY };
      vp.style.cursor = 'grabbing';
    };
    const onPointerMove = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx;
      tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY;
      apply();
    };
    const onPointerUp = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      vp.releasePointerCapture(e.pointerId);
      drag = null;
      vp.style.cursor = '';
    };

    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGestureStart, { passive: false });
    vp.addEventListener('gesturechange', onGestureChange, { passive: false });
    vp.addEventListener('gestureend', onGestureEnd, { passive: false });
    vp.addEventListener('pointerdown', onPointerDown);
    vp.addEventListener('pointermove', onPointerMove);
    vp.addEventListener('pointerup', onPointerUp);
    vp.addEventListener('pointercancel', onPointerUp);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGestureStart);
      vp.removeEventListener('gesturechange', onGestureChange);
      vp.removeEventListener('gestureend', onGestureEnd);
      vp.removeEventListener('pointerdown', onPointerDown);
      vp.removeEventListener('pointermove', onPointerMove);
      vp.removeEventListener('pointerup', onPointerUp);
      vp.removeEventListener('pointercancel', onPointerUp);
    };
  }, [apply, minScale, maxScale]);

  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div
      ref={vpRef}
      className="design-canvas"
      style={{
        height: '100vh', width: '100vw',
        background: DC.bg,
        overflow: 'hidden',
        overscrollBehavior: 'none',
        touchAction: 'none',
        position: 'relative',
        fontFamily: DC.font,
        boxSizing: 'border-box',
        ...style,
      }}
    >
      <div
        ref={worldRef}
        style={{
          position: 'absolute', top: 0, left: 0,
          transformOrigin: '0 0',
          willChange: 'transform',
          width: 'max-content', minWidth: '100%',
          minHeight: '100%',
          padding: '60px 0 80px',
        }}
      >
        <div style={{ position: 'absolute', inset: -6000, backgroundImage: gridSvg, backgroundSize: '120px 120px', pointerEvents: 'none', zIndex: -1 }} />
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// DCSection — editable title + h-row of artboards in persisted order
// ─────────────────────────────────────────────────────────────
function DCSection({ id, title, subtitle, children, gap = 48 }) {
  const ctx = React.useContext(DCCtx);
  const sid = id ?? title;
  const all = React.Children.toArray(children);
  const artboards = all.filter((c) => c && c.type === DCArtboard);
  const rest = all.filter((c) => !(c && c.type === DCArtboard));
  const srcOrder = artboards.map((a) => a.props.id ?? a.props.label);
  const sec = (ctx && sid && ctx.section(sid)) || {};

  const order = React.useMemo(() => {
    const kept = (sec.order || []).filter((k) => srcOrder.includes(k));
    return [...kept, ...srcOrder.filter((k) => !kept.includes(k))];
  }, [sec.order, srcOrder.join('|')]);

  const byId = Object.fromEntries(artboards.map((a) => [a.props.id ?? a.props.label, a]));

  return (
    <div data-dc-section={sid} style={{ marginBottom: 80, position: 'relative' }}>
      <div style={{ padding: '0 60px 56px' }}>
        <DCEditable tag="div" value={sec.title ?? title}
          onChange={(v) => ctx && sid && ctx.patchSection(sid, { title: v })}
          style={{ fontSize: 28, fontWeight: 600, color: DC.title, letterSpacing: -0.4, marginBottom: 6, display: 'inline-block' }} />
        {subtitle && <div style={{ fontSize: 16, color: DC.subtitle }}>{subtitle}</div>}
      </div>
      <div style={{ display: 'flex', gap, padding: '0 60px', alignItems: 'flex-start', width: 'max-content' }}>
        {order.map((k) => (
          <DCArtboardFrame key={k} sectionId={sid} artboard={byId[k]} order={order}
            label={(sec.labels || {})[k] ?? byId[k].props.label}
            onRename={(v) => ctx && ctx.patchSection(sid, (x) => ({ labels: { ...x.labels, [k]: v } }))}
            onReorder={(next) => ctx && ctx.patchSection(sid, { order: next })}
            onFocus={() => ctx && ctx.setFocus(`${sid}/${k}`)} />
        ))}
      </div>
      {rest}
    </div>
  );
}

// DCArtboard — marker; rendered by DCArtboardFrame via DCSection.
function DCArtboard() { return null; }

function DCArtboardFrame({ sectionId, artboard, label, order, onRename, onReorder, onFocus }) {
  const { id: rawId, label: rawLabel, width = 260, height = 480, children, style = {} } = artboard.props;
  const id = rawId ?? rawLabel;
  const ref = React.useRef(null);

  // Live drag-reorder: dragged card sticks to cursor; siblings slide into
  // their would-be slots in real time via transforms. DOM order only
  // changes on drop.
  const onGripDown = (e) => {
    e.preventDefault(); e.stopPropagation();
    const me = ref.current;
    // translateX is applied in local (pre-scale) space but pointer deltas and
    // getBoundingClientRect().left are screen-space — divide by the viewport's
    // current scale so the dragged card tracks the cursor at any zoom level.
    const scale = me.getBoundingClientRect().width / me.offsetWidth || 1;
    const peers = Array.from(document.querySelectorAll(`[data-dc-section="${sectionId}"] [data-dc-slot]`));
    const homes = peers.map((el) => ({ el, id: el.dataset.dcSlot, x: el.getBoundingClientRect().left }));
    const slotXs = homes.map((h) => h.x);
    const startIdx = order.indexOf(id);
    const startX = e.clientX;
    let liveOrder = order.slice();
    me.classList.add('dc-dragging');

    const layout = () => {
      for (const h of homes) {
        if (h.id === id) continue;
        const slot = liveOrder.indexOf(h.id);
        h.el.style.transform = `translateX(${(slotXs[slot] - h.x) / scale}px)`;
      }
    };

    const move = (ev) => {
      const dx = ev.clientX - startX;
      me.style.transform = `translateX(${dx / scale}px)`;
      const cur = homes[startIdx].x + dx;
      let nearest = 0, best = Infinity;
      for (let i = 0; i < slotXs.length; i++) {
        const d = Math.abs(slotXs[i] - cur);
        if (d < best) { best = d; nearest = i; }
      }
      if (liveOrder.indexOf(id) !== nearest) {
        liveOrder = order.filter((k) => k !== id);
        liveOrder.splice(nearest, 0, id);
        layout();
      }
    };

    const up = () => {
      document.removeEventListener('pointermove', move);
      document.removeEventListener('pointerup', up);
      const finalSlot = liveOrder.indexOf(id);
      me.classList.remove('dc-dragging');
      me.style.transform = `translateX(${(slotXs[finalSlot] - homes[startIdx].x) / scale}px)`;
      // After the settle transition, kill transitions + clear transforms +
      // commit the reorder in the same frame so there's no visual snap-back.
      setTimeout(() => {
        for (const h of homes) { h.el.style.transition = 'none'; h.el.style.transform = ''; }
        if (liveOrder.join('|') !== order.join('|')) onReorder(liveOrder);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          for (const h of homes) h.el.style.transition = '';
        }));
      }, 180);
    };
    document.addEventListener('pointermove', move);
    document.addEventListener('pointerup', up);
  };

  return (
    <div ref={ref} data-dc-slot={id} style={{ position: 'relative', flexShrink: 0 }}>
      <div className="dc-labelrow" style={{ position: 'absolute', bottom: '100%', left: -4, marginBottom: 4, color: DC.label }}>
        <div className="dc-grip" onPointerDown={onGripDown} title="Drag to reorder">
          <svg width="9" height="13" viewBox="0 0 9 13" fill="currentColor"><circle cx="2" cy="2" r="1.1"/><circle cx="7" cy="2" r="1.1"/><circle cx="2" cy="6.5" r="1.1"/><circle cx="7" cy="6.5" r="1.1"/><circle cx="2" cy="11" r="1.1"/><circle cx="7" cy="11" r="1.1"/></svg>
        </div>
        <div className="dc-labeltext" onClick={onFocus} title="Click to focus">
          <DCEditable value={label} onChange={onRename} onClick={(e) => e.stopPropagation()}
            style={{ fontSize: 15, fontWeight: 500, color: DC.label, lineHeight: 1 }} />
        </div>
      </div>
      <button className="dc-expand" onClick={onFocus} onPointerDown={(e) => e.stopPropagation()} title="Focus">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M7 1h4v4M5 11H1V7M11 1L7.5 4.5M1 11l3.5-3.5"/></svg>
      </button>
      <div className="dc-card"
        style={{ borderRadius: 2, boxShadow: '0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06)', overflow: 'hidden', width, height, background: '#fff', ...style }}>
        {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb', fontSize: 13, fontFamily: DC.font }}>{id}</div>}
      </div>
    </div>
  );
}

// Inline rename — commits on blur or Enter.
function DCEditable({ value, onChange, style, tag = 'span', onClick }) {
  const T = tag;
  return (
    <T className="dc-editable" contentEditable suppressContentEditableWarning
      onClick={onClick}
      onPointerDown={(e) => e.stopPropagation()}
      onBlur={(e) => onChange && onChange(e.currentTarget.textContent)}
      onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); e.currentTarget.blur(); } }}
      style={style}>{value}</T>
  );
}

// ─────────────────────────────────────────────────────────────
// Focus mode — overlay one artboard; ←/→ within section, ↑/↓ across
// sections, Esc or backdrop click to exit.
// ─────────────────────────────────────────────────────────────
function DCFocusOverlay({ entry, sectionMeta, sectionOrder }) {
  const ctx = React.useContext(DCCtx);
  const { sectionId, artboard } = entry;
  const sec = ctx.section(sectionId);
  const meta = sectionMeta[sectionId];
  const peers = meta.slotIds;
  const aid = artboard.props.id ?? artboard.props.label;
  const idx = peers.indexOf(aid);
  const secIdx = sectionOrder.indexOf(sectionId);

  const go = (d) => { const n = peers[(idx + d + peers.length) % peers.length]; if (n) ctx.setFocus(`${sectionId}/${n}`); };
  const goSection = (d) => {
    const ns = sectionOrder[(secIdx + d + sectionOrder.length) % sectionOrder.length];
    const first = sectionMeta[ns] && sectionMeta[ns].slotIds[0];
    if (first) ctx.setFocus(`${ns}/${first}`);
  };

  React.useEffect(() => {
    const k = (e) => {
      if (e.key === 'ArrowLeft') { e.preventDefault(); go(-1); }
      if (e.key === 'ArrowRight') { e.preventDefault(); go(1); }
      if (e.key === 'ArrowUp') { e.preventDefault(); goSection(-1); }
      if (e.key === 'ArrowDown') { e.preventDefault(); goSection(1); }
    };
    document.addEventListener('keydown', k);
    return () => document.removeEventListener('keydown', k);
  });

  const { width = 260, height = 480, children } = artboard.props;
  const [vp, setVp] = React.useState({ w: window.innerWidth, h: window.innerHeight });
  React.useEffect(() => { const r = () => setVp({ w: window.innerWidth, h: window.innerHeight }); window.addEventListener('resize', r); return () => window.removeEventListener('resize', r); }, []);
  const scale = Math.max(0.1, Math.min((vp.w - 200) / width, (vp.h - 260) / height, 2));

  const [ddOpen, setDd] = React.useState(false);
  const Arrow = ({ dir, onClick }) => (
    <button onClick={(e) => { e.stopPropagation(); onClick(); }}
      style={{ position: 'absolute', top: '50%', [dir]: 28, transform: 'translateY(-50%)',
        border: 'none', background: 'rgba(255,255,255,.08)', color: 'rgba(255,255,255,.9)',
        width: 44, height: 44, borderRadius: 22, fontSize: 18, cursor: 'pointer',
        display: 'flex', alignItems: 'center', justifyContent: 'center', transition: 'background .15s' }}
      onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.18)')}
      onMouseLeave={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.08)')}>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round">
        <path d={dir === 'left' ? 'M11 3L5 9l6 6' : 'M7 3l6 6-6 6'} /></svg>
    </button>
  );

  // Portal to body so position:fixed is the real viewport regardless of any
  // transform on DesignCanvas's ancestors (including the canvas zoom itself).
  return ReactDOM.createPortal(
    <div onClick={() => ctx.setFocus(null)}
      onWheel={(e) => e.preventDefault()}
      style={{ position: 'fixed', inset: 0, zIndex: 100, background: 'rgba(24,20,16,.6)', backdropFilter: 'blur(14px)',
        fontFamily: DC.font, color: '#fff' }}>

      {/* top bar: section dropdown (left) · close (right) */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', top: 0, left: 0, right: 0, height: 72, display: 'flex', alignItems: 'flex-start', padding: '16px 20px 0', gap: 16 }}>
        <div style={{ position: 'relative' }}>
          <button onClick={() => setDd((o) => !o)}
            style={{ border: 'none', background: 'transparent', color: '#fff', cursor: 'pointer', padding: '6px 8px',
              borderRadius: 6, textAlign: 'left', fontFamily: 'inherit' }}>
            <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <span style={{ fontSize: 18, fontWeight: 600, letterSpacing: -0.3 }}>{meta.title}</span>
              <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" style={{ opacity: .7 }}><path d="M2 4l3.5 3.5L9 4"/></svg>
            </span>
            {meta.subtitle && <span style={{ display: 'block', fontSize: 13, opacity: .6, fontWeight: 400, marginTop: 2 }}>{meta.subtitle}</span>}
          </button>
          {ddOpen && (
            <div style={{ position: 'absolute', top: '100%', left: 0, marginTop: 4, background: '#2a251f', borderRadius: 8,
              boxShadow: '0 8px 32px rgba(0,0,0,.4)', padding: 4, minWidth: 200, zIndex: 10 }}>
              {sectionOrder.map((sid) => (
                <button key={sid} onClick={() => { setDd(false); const f = sectionMeta[sid].slotIds[0]; if (f) ctx.setFocus(`${sid}/${f}`); }}
                  style={{ display: 'block', width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
                    background: sid === sectionId ? 'rgba(255,255,255,.1)' : 'transparent', color: '#fff',
                    padding: '8px 12px', borderRadius: 5, fontSize: 14, fontWeight: sid === sectionId ? 600 : 400, fontFamily: 'inherit' }}>
                  {sectionMeta[sid].title}
                </button>
              ))}
            </div>
          )}
        </div>
        <div style={{ flex: 1 }} />
        <button onClick={() => ctx.setFocus(null)}
          onMouseEnter={(e) => (e.currentTarget.style.background = 'rgba(255,255,255,.12)')}
          onMouseLeave={(e) => (e.currentTarget.style.background = 'transparent')}
          style={{ border: 'none', background: 'transparent', color: 'rgba(255,255,255,.7)', width: 32, height: 32,
            borderRadius: 16, fontSize: 20, cursor: 'pointer', lineHeight: 1, transition: 'background .12s' }}>×</button>
      </div>

      {/* card centered, label + index below — only the card itself stops
          propagation so any backdrop click (including the margins around
          the card) exits focus */}
      <div
        style={{ position: 'absolute', top: 64, bottom: 56, left: 100, right: 100, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 16 }}>
        <div onClick={(e) => e.stopPropagation()} style={{ width: width * scale, height: height * scale, position: 'relative' }}>
          <div style={{ width, height, transform: `scale(${scale})`, transformOrigin: 'top left', background: '#fff', borderRadius: 2, overflow: 'hidden',
            boxShadow: '0 20px 80px rgba(0,0,0,.4)' }}>
            {children || <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#bbb' }}>{aid}</div>}
          </div>
        </div>
        <div onClick={(e) => e.stopPropagation()} style={{ fontSize: 14, fontWeight: 500, opacity: .85, textAlign: 'center' }}>
          {(sec.labels || {})[aid] ?? artboard.props.label}
          <span style={{ opacity: .5, marginLeft: 10, fontVariantNumeric: 'tabular-nums' }}>{idx + 1} / {peers.length}</span>
        </div>
      </div>

      <Arrow dir="left" onClick={() => go(-1)} />
      <Arrow dir="right" onClick={() => go(1)} />

      {/* dots */}
      <div onClick={(e) => e.stopPropagation()}
        style={{ position: 'absolute', bottom: 20, left: '50%', transform: 'translateX(-50%)', display: 'flex', gap: 8 }}>
        {peers.map((p, i) => (
          <button key={p} onClick={() => ctx.setFocus(`${sectionId}/${p}`)}
            style={{ border: 'none', padding: 0, cursor: 'pointer', width: 6, height: 6, borderRadius: 3,
              background: i === idx ? '#fff' : 'rgba(255,255,255,.3)' }} />
        ))}
      </div>
    </div>,
    document.body,
  );
}

// ─────────────────────────────────────────────────────────────
// Post-it — absolute-positioned sticky note
// ─────────────────────────────────────────────────────────────
function DCPostIt({ children, top, left, right, bottom, rotate = -2, width = 180 }) {
  return (
    <div style={{
      position: 'absolute', top, left, right, bottom, width,
      background: DC.postitBg, padding: '14px 16px',
      fontFamily: '"Comic Sans MS", "Marker Felt", "Segoe Print", cursive',
      fontSize: 14, lineHeight: 1.4, color: DC.postitText,
      boxShadow: '0 2px 8px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.08)',
      transform: `rotate(${rotate}deg)`,
      zIndex: 5,
    }}>{children}</div>
  );
}

Object.assign(window, { DesignCanvas, DCSection, DCArtboard, DCPostIt });


</script>

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-file="wf-shared.jsx">
// Shared wireframe primitives — sidebar, topbar, person card, fan SVG bits

const SIDE_ITEMS = [

      )}

    </div>

}

// Annotated arrow + handwritten note. anchor: {x,y} (the labelled point).
// note: {x,y} (the handwritten text origin). Optional.
function Anno({ note, x, y, w = 200, align = 'left', children }) {
  const style = {
    left: x, top: y, width: w, textAlign: align,
  };
  return <div className="wf-anno" style={style}>{children}</div>;
}

// Striped diagonal portrait placeholder (no SVG drawing of faces)
function Portrait({ size = 36, label = 'photo', round = true, dark = false }) {

// Compact person card used inside fan/tree/timeline at small size.
// density: 'min' | 'med' | 'rich'
function PersonChip({
  name = 'Jean Lefèvre',
  dates = '1842–1893',
  job,
  status,            // e.g. 'Mort en Mer'
  living = false,
  density = 'med',

}) {

    position: 'relative',
  };
  return (
    <div style={style}>
      <div style={{ display: 'flex', gap: 5, alignItems: 'flex-start' }}>
        {density !== 'min' && <Portrait size={density === 'rich' ? 24 : 18} round />}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div className="wf-serif" style={{ fontSize: 10.5, lineHeight: 1.1, color: 'var(--ink)' }}>{name}</div>
          <div className="wf-mono" style={{ fontSize: 8, color: 'var(--ink-3)', marginTop: 1 }}>
            {dates}{living ? ' ·' : ''}{living ? ' vivant' : ''}
          </div>
          {density === 'rich' && job && (
            <div style={{ fontSize: 8.5, color: 'var(--ink-2)', marginTop: 1 }}>{job}</div>
          )}
        </div>
      </div>
      {density === 'rich' && status && (
        <div style={{ marginTop: 3, display: 'flex', gap: 3, flexWrap: 'wrap' }}>
          <span className="wf-tag warn" style={{ fontSize: 7.5, padding: '0 4px' }}>⚓ {status}</span>
        </div>
      )}
    </div>
  );
}

// Minimal radial label for fan generation labels
function GenLabel({ cx, cy, r, angle, gen }) {
  const a = (angle - 90) * Math.PI / 180;
  return (
    <text x={cx + r * Math.cos(a)} y={cy + r * Math.sin(a)}
      textAnchor="middle" dominantBaseline="middle"
      fontFamily="var(--font-mono)" fontSize="8" fill="var(--ink-3)"
      style={{ letterSpacing: '0.1em' }}>
      G{gen}
    </text>
  );
}

// Build a polar arc path for fan sectors
function arcPath(cx, cy, r0, r1, a0, a1) {
  const toXY = (r, deg) => {
    const a = (deg - 90) * Math.PI / 180;
    return [cx + r * Math.cos(a), cy + r * Math.sin(a)];
  };
  const [x0a, y0a] = toXY(r0, a0);
  const [x0b, y0b] = toXY(r0, a1);
  const [x1a, y1a] = toXY(r1, a0);
  const [x1b, y1b] = toXY(r1, a1);
  const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
  return [
    `M ${x0a} ${y0a}`,
    `A ${r0} ${r0} 0 ${large} 1 ${x0b} ${y0b}`,
    `L ${x1b} ${y1b}`,
    `A ${r1} ${r1} 0 ${large} 0 ${x1a} ${y1a}`,
    'Z',
  ].join(' ');
}

// Generate a generation's sectors (returns array of {path, midR, midA, gen, key})
function fanGen({ cx, cy, gen, startA, endA, r0, r1 }) {
  const count = Math.pow(2, gen);
  const span = (endA - startA) / count;
  const sectors = [];
  for (let i = 0; i < count; i++) {
    const a0 = startA + i * span;
    const a1 = a0 + span;
    sectors.push({
      key: `${gen}-${i}`,
      path: arcPath(cx, cy, r0, r1, a0, a1),
      midA: (a0 + a1) / 2,
      midR: (r0 + r1) / 2,
      span,
    });
  }
  return sectors;
}

// Polar->Cartesian helper for placing labels
function polar(cx, cy, r, deg) {
  const a = (deg - 90) * Math.PI / 180;
  return { x: cx + r * Math.cos(a), y: cy + r * Math.sin(a) };
}

// Pre-baked sample names per generation (G0=ego, G1..)
const NAMES = {
  0: ['Camille Lefèvre'],
  1: ['Jean Lefèvre', 'Marguerite Roux'],
  2: ['Pierre Lefèvre', 'Anne Berthier', 'Étienne Roux', 'Louise Caron'],
  3: ['Henri L.', 'Sophie M.', 'Paul B.', 'Madeleine V.', 'François R.', 'Élise T.', 'Antoine C.', 'Jeanne D.'],
  4: Array.from({length: 16}, (_, i) => ['•','•','•','•'][i%4] + ' G4-' + (i+1)),
  5: Array.from({length: 32}, () => ''),
};

const DATES = {
  0: ['1981–'],
  1: ['1948–2019', '1952–'],
  2: ['1918–1981', '1922–2003', '1920–1995', '1925–2010'],
  3: ['1885–1962', '1890–1971', '1882–1958', '1888–1969', '1887–1955', '1893–1980', '1880–1950', '1895–1972'],
  4: Array(16).fill('1850–1920'),
  5: Array(32).fill(''),
};

const JOBS = {
  0: ['Architecte'],
  1: ['Charpentier de marine', 'Institutrice'],
  2: ['Pêcheur', 'Couturière', 'Forgeron', 'Sage-femme'],
  3: ['Marin', 'Lingère', 'Boulanger', '—', 'Vigneron', 'Modiste', 'Notaire', '—'],
};

const STATUS = {
  1: [{ kind: 'sea', label: 'Mort en Mer' }, null],
  2: [null, null, null, null],
  3: [{ kind: 'sea', label: 'Mort en Mer' }, null, null, null, null, null, null, null],
};

Object.assign(window, {
  Sidebar, Topbar, Anno, Portrait, PersonChip, GenLabel,
  arcPath, fanGen, polar, NAMES, DATES, JOBS, STATUS,
});

</script>
<script type="text/babel" data-file="wf-fan.jsx">
// Fan view variants — the hero of the app, 4 takes.

// ─────────────────────────────────────────────────────────────
// Shared SVG fan renderer
// mode: 'half' | 'full' | 'inverted' | 'compressed' | 'hybrid'
// ─────────────────────────────────────────────────────────────
function FanSVG({
  cx = 380, cy = 440, generations = 5,
  startA = -90, endA = 90,           // half-circle by default
  r0 = 38, ringStep = 56,
  hoverSector = null,                 // {gen, idx}
  emptyMask = {},                      // gen -> Set of empty indices (compressed)
  palette = 'gray',
  showNames = true,
  width = 760, height = 480,
}) {
  // colors
  const PAL = {
    gray:   { fill: ['#f4f1eb','#ece8df','#e3ddd0','#d8d0bf','#cbc0aa'], stroke: '#c9c4ba', text: '#1a1a1f', sub: '#807e88' },
    warm:   { fill: ['#f8f1e6','#f0e3cf','#e8d3b6','#d9b890','#b8593a'], stroke: '#b89a78', text: '#1a1a1f', sub: '#705a48' },
    cool:   { fill: ['#eef1f5','#dfe5ed','#cdd6e2','#b3c0d2','#4a5a78'], stroke: '#94a3b8', text: '#16202c', sub: '#5a6a82' },
    dark:   { fill: ['#1f1f24','#262630','#2e2e38','#383844','#b8593a'], stroke: '#3a3a45', text: '#e8e6e1', sub: '#807e7a' },
  }[palette] || {};

  const sectors = [];
  for (let g = 1; g <= generations; g++) {
    const ring = fanGen({
      cx, cy, gen: g, startA, endA,
      r0: r0 + (g - 1) * ringStep,
      r1: r0 + g * ringStep,
    });
    ring.forEach((s, i) => {
      sectors.push({ ...s, gen: g, idx: i });
    });
  }

  // detect ancestor lineage from hovered sector (highlight all parents up the tree)
  const lineage = new Set();
  if (hoverSector) {
    let g = hoverSector.gen, i = hoverSector.idx;
    while (g >= 1) {
      lineage.add(`${g}-${i}`);
      i = Math.floor(i / 2); g--;
    }
  }

  return (
    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ display: 'block' }}>
      {/* Generation guide rings */}
      {Array.from({ length: generations }, (_, i) => i + 1).map(g => {
        // Build a thin path along the outer arc for the gen label
        const labelR = r0 + (g - 0.5) * ringStep;
        return (
          <text key={'lab' + g}
            x={cx} y={cy - labelR - 2}
            textAnchor="middle"
            fontFamily="'Geist Mono', monospace" fontSize="8"
            fill={PAL.sub}
            style={{ letterSpacing: '0.12em' }}>
            G{g}
          </text>
        );
      })}

      {/* Sectors */}
      {sectors.map(s => {
        const empty = emptyMask[s.gen]?.has(s.idx);
        const inLine = lineage.has(`${s.gen}-${s.idx}`);
        const fill = empty ? 'transparent' : PAL.fill[Math.min(s.gen - 1, PAL.fill.length - 1)];
        return (
          <path key={s.key} d={s.path}
            fill={fill}
            stroke={PAL.stroke}
            strokeWidth={inLine ? 1.4 : 0.6}
            strokeDasharray={empty ? '3 3' : 'none'}
            opacity={hoverSector && !inLine ? 0.55 : 1}
          />
        );
      })}

      {/* Ego (center) */}
      <circle cx={cx} cy={cy} r={r0 - 4} fill={PAL.fill[0]} stroke={PAL.stroke} strokeWidth="1" />
      <text x={cx} y={cy - 2} textAnchor="middle" fontFamily="'Fraunces', serif" fontSize="11" fill={PAL.text}>
        Camille
      </text>
      <text x={cx} y={cy + 9} textAnchor="middle" fontFamily="'Geist Mono', monospace" fontSize="7" fill={PAL.sub}>
        1981–
      </text>

      {/* Sector labels — only for outer 3 generations to avoid clutter */}
      {showNames && sectors.map(s => {
        if (s.gen > 3) return null;
        if (emptyMask[s.gen]?.has(s.idx)) return null;
        const r = (r0 + (s.gen - 1) * ringStep + r0 + s.gen * ringStep) / 2;
        const p = polar(cx, cy, r, s.midA);
        const rotation = s.midA > 0 ? s.midA - 90 : s.midA + 90;
        const isInverted = startA > 0; // descendants below
        return (
          <g key={'l' + s.key} transform={`translate(${p.x},${p.y}) rotate(${rotation})`}>
            <text textAnchor="middle" dominantBaseline="middle"
              fontFamily="'Fraunces', serif" fontSize={s.gen === 1 ? 10 : s.gen === 2 ? 9 : 7.5}
              fill={PAL.text}>
              {NAMES[s.gen]?.[s.idx] || ''}
            </text>
            {s.gen <= 2 && (
              <text textAnchor="middle" dominantBaseline="middle" y={9}
                fontFamily="'Geist Mono', monospace" fontSize="6.5"
                fill={PAL.sub}>
                {DATES[s.gen]?.[s.idx] || ''}
              </text>
            )}
            {/* Statut de décès picto */}
            {STATUS[s.gen]?.[s.idx] && s.gen <= 2 && (
              <text textAnchor="middle" dominantBaseline="middle" y={-9}
                fontSize="9" fill={PAL.fill[4]}>⚓</text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

// ─────────────────────────────────────────────────────────────
// Variant A — Demi-cercle classique 5 générations
// ─────────────────────────────────────────────────────────────
function FanVariantA({ palette = 'gray' }) {
  return (
    <div className="wf" style={{ display: 'flex' }}>
      <Sidebar active="EV" />

function FanSVGInline({ cx, cy, generations, startA, endA, r0, ringStep, palette, inverted }) {
  const PAL = {
    gray:   { fill: ['#f4f1eb','#ece8df','#e3ddd0','#d8d0bf'], stroke: '#c9c4ba', text: '#1a1a1f', sub: '#807e88' },
    warm:   { fill: ['#f8f1e6','#f0e3cf','#e8d3b6','#d9b890'], stroke: '#b89a78', text: '#1a1a1f', sub: '#705a48' },
    cool:   { fill: ['#eef1f5','#dfe5ed','#cdd6e2','#b3c0d2'], stroke: '#94a3b8', text: '#16202c', sub: '#5a6a82' },
    dark:   { fill: ['#1f1f24','#262630','#2e2e38','#383844'], stroke: '#3a3a45', text: '#e8e6e1', sub: '#807e7a' },
  }[palette] || {};

  const sectors = [];
  for (let g = 1; g <= generations; g++) {
    const ring = fanGen({ cx, cy, gen: g, startA, endA,
      r0: r0 + (g - 1) * ringStep, r1: r0 + g * ringStep });
    ring.forEach((s, i) => sectors.push({ ...s, gen: g, idx: i }));
  }

  return (
    <g>
      {sectors.map(s => (
        <path key={s.key} d={s.path}
          fill={PAL.fill[Math.min(s.gen - 1, PAL.fill.length - 1)]}
          stroke={PAL.stroke} strokeWidth="0.6" />
      ))}
      {sectors.filter(s => s.gen <= 2).map(s => {
        const r = (r0 + (s.gen - 1) * ringStep + r0 + s.gen * ringStep) / 2;
        const p = polar(cx, cy, r, s.midA);
        const rot = s.midA > 0 ? s.midA - 90 : s.midA + 90;
        const list = inverted ? ['Léa', 'Théo', 'Inès', 'Hugo'] : NAMES[s.gen] || [];
        return (
          <g key={'l' + s.key} transform={`translate(${p.x},${p.y}) rotate(${rot})`}>
            <text textAnchor="middle" dominantBaseline="middle"
              fontFamily="'Fraunces', serif" fontSize={s.gen === 1 ? 9 : 7.5}
              fill={PAL.text}>
              {list[s.idx] || ''}
            </text>
          </g>
        );
      })}
      {!inverted && (
        <>
          <circle cx={cx} cy={cy} r={r0 - 4} fill={PAL.fill[0]} stroke={PAL.stroke} />
          <text x={cx} y={cy + 1} textAnchor="middle" fontFamily="'Fraunces', serif" fontSize="10" fill={PAL.text}>Camille</text>
        </>
      )}
    </g>
  );
}

              <rect x={28} y={28} width={42} height={26} fill="none" stroke="var(--accent)" />
            </svg>
          </Box>
          <Box title="Cellule recherche ⌘K" mui="custom">
            <div style={{ display: 'flex', gap: 8, alignItems: 'center', padding: 6, background: 'var(--paper-2)', borderRadius: 5 }}>
              <Portrait size={22} round />
              <div style={{ flex: 1 }}>
                <div className="wf-serif" style={{ fontSize: 12 }}>Pierre Lefèvre</div>
                <div className="wf-mono" style={{ fontSize: 9, color: 'var(--ink-3)' }}>1842–1893</div>
              </div>
              <span className="wf-mono" style={{ fontSize: 10, color: 'var(--ink-3)' }}>↩</span>
            </div>
          </Box>
        </div>

        <div className="wf-divider" style={{ margin: '24px 0' }} />
        <div className="wf-eyebrow">Notes d'accessibilité</div>
        <ul style={{ fontSize: 12, lineHeight: 1.6, color: 'var(--ink-2)', margin: '6px 0', paddingLeft: 20 }}>
          <li>WCAG AA · contraste vérifié sur les 3 palettes (gris / chaude / sombre)</li>
          <li>Éventail SVG : <code className="wf-mono">role="tree"</code>, chaque secteur <code className="wf-mono">role="treeitem"</code> avec aria-level = génération</li>
          <li>Navigation clavier : flèches pour changer de secteur, ↑/↓ génération, Entrée pour ouvrir le panneau</li>
          <li>Lecteur d'écran annonce : nom, dates, lien de parenté avec l'ego, statut</li>
          <li>Raccourcis visibles partout (footer ou tooltip ⌘?)</li>
        </ul>

        <div className="wf-divider" style={{ margin: '24px 0' }} />
        <div className="wf-eyebrow">Zones desktop-only à repenser pour mobile</div>
        <ul style={{ fontSize: 12, lineHeight: 1.6, color: 'var(--ink-2)', margin: '6px 0', paddingLeft: 20 }}>
          <li>Panneau latéral 40% → bottom-sheet 80% sur mobile, swipe pour fermer</li>
          <li>Éventail 5 générations → 3 max en portrait, geste pinch-to-zoom essentiel</li>
          <li>Toolbar flottante → barre du bas fixe avec 3 actions principales</li>
          <li>Mini-map masquée par défaut, accessible via long-press</li>
          <li>⌘K → bouton recherche en topbar, plein écran à l'ouverture</li>
        </ul>
      </div>
    </div>
  );
}

Object.assign(window, {
  ScreenDashboard, ScreenTree, ScreenTimeline, ScreenPersonPanel,
  ScreenAddEdit, ScreenPhotos, ScreenHints, ScreenSearch, ScreenComponents,
});

</script>
<script type="text/babel" data-file="wf-app.jsx">
// Main app — assembles all screens into the design canvas with Tweaks.

const { useTweaks, TweaksPanel, TweakSection, TweakRadio, TweakSelect, TweakSlider, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "palette": "gray",
  "density": "med",
  "depth": 5,
  "showAnnotations": true
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const palette = tweaks.palette;

  // Apply palette class globally to all artboards via CSS scope.
  // We pass `palette` to the Fan variants and let them recolor.
  // For non-fan screens, we toggle a class on .wf root.

  React.useEffect(() => {
    document.body.style.setProperty('--canvas-pal', palette);
  }, [palette]);

  // Wrap each artboard's content with a palette class so swatches change live.
  const wrap = (node) => (
    <div className={'wf ' + (palette === 'dark' ? 'dark' : palette === 'cool' ? 'cool' : '')}
      style={{ width: '100%', height: '100%' }}>
      {node}
    </div>
  );

  return (
    <>
      <DesignCanvas>
        {/* SECTION 1 — Vision & système */}
        <DCSection id="intro" title="GegeDot · Wireframes" subtitle="Atelier de l'historien moderne — 10 écrans, 4 variantes éventail, 3 palettes">
          <DCArtboard id="cover" label="00 · Manifeste" width={760} height={520}>
            <div className="wf" style={{ padding: '40px 44px' }}>
              <div className="wf-eyebrow">GegeDot · 2026</div>
              <h1 className="wf-serif" style={{ fontSize: 44, fontWeight: 400, lineHeight: 1.05, margin: '6px 0 12px', maxWidth: 580 }}>
                Une bibliothèque feutrée<br/>
                <span style={{ fontStyle: 'italic', color: 'var(--ink-3)' }}>pour explorer sa famille.</span>
              </h1>
              <p style={{ fontSize: 13, lineHeight: 1.55, color: 'var(--ink-2)', maxWidth: 520, margin: '0 0 20px' }}>
                Wireframes haute-fidélité — gris chauds par défaut, deux palettes colorées proposées, mode sombre. Typographie : <span className="wf-serif">Fraunces</span> pour les patronymes, <span style={{ fontFamily: 'Geist' }}>Geist</span> pour l'UI. Aucun parchemin, aucun blason, aucune police gothique.
              </p>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 8, marginTop: 24 }}>
                {[
                  ['Ivoire', '#F8F5F0'], ['Encre', '#1A1A1F'],
                  ['Sépia', '#B8593A'], ['Mousse', '#6B7C5A'],
                ].map(([n, c]) => (
                  <div key={n} style={{ border: '1px solid var(--line)', borderRadius: 6, padding: 8, background: 'var(--paper)' }}>
                    <div style={{ width: '100%', height: 30, background: c, borderRadius: 3, border: '1px solid var(--line-2)' }} />
                    <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4 }}>
                      <span className="wf-serif" style={{ fontSize: 11 }}>{n}</span>
                      <span className="wf-mono" style={{ fontSize: 9, color: 'var(--ink-3)' }}>{c}</span>
                    </div>
                  </div>
                ))}
              </div>
              <div className="wf-divider" style={{ margin: '20px 0' }} />
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, fontSize: 11, color: 'var(--ink-2)', lineHeight: 1.5 }}>
                <div>
                  <div className="wf-eyebrow" style={{ marginBottom: 4 }}>Identité</div>
                  Vue éventail comme signature — déclinée en 4 variantes (demi-cercle, cercle complet, hybride, compressé).
                </div>
                <div>
                  <div className="wf-eyebrow" style={{ marginBottom: 4 }}>Données</div>
                  Modèle respecté à la lettre — 13 types de relation, statut décès libre, conjoints multiples avec fenêtres temporelles. Pas d'ADN, pas d'origines géographiques.
                </div>
                <div>
                  <div className="wf-eyebrow" style={{ marginBottom: 4 }}>Ton</div>
                  Sobre. Digne. La mort, la mer, les divorces — traités sans morbidité ni mièvrerie.
                </div>
              </div>
            </div>
          </DCArtboard>
        </DCSection>

        {/* SECTION 2 — Hub et hero */}
        <DCSection id="hub" title="Tableau de bord & vue principale" subtitle="L'ouverture de l'app et son écran-héros">
          <DCArtboard id="dash" label="01 · Dashboard d'accueil" width={1100} height={720}>
            {wrap(<ScreenDashboard />)}
          </DCArtboard>
          <DCArtboard id="fanA" label="02 · Éventail · demi-cercle (par défaut)" width={1100} height={720}>
            {wrap(<FanVariantA palette={palette} />)}
          </DCArtboard>
        </DCSection>

        {/* SECTION 3 — Variantes Éventail */}
        <DCSection id="fans" title="Vue éventail · 4 variantes" subtitle="Demi-cercle, cercle complet, hybride, compressé. Toutes commutables d'un clic depuis la même donnée.">
          <DCArtboard id="fanB" label="A · Cercle complet (asc + desc)" width={1100} height={720}>
            {wrap(<FanVariantB palette={palette} />)}
          </DCArtboard>
          <DCArtboard id="fanC" label="B · Hybride éventail ↔ arbre" width={1100} height={720}>
            {wrap(<FanVariantC palette={palette} />)}
          </DCArtboard>
          <DCArtboard id="fanD" label="C · Compression intelligente" width={1100} height={720}>
            {wrap(<FanVariantD palette={palette} />)}
          </DCArtboard>
        </DCSection>

        {/* SECTION 4 — Autres vues du même canvas */}
        <DCSection id="views" title="Autres vues · même donnée" subtitle="Arbre vertical et timeline — transitions animées entre vues.">
          <DCArtboard id="tree" label="03 · Arbre vertical" width={1100} height={720}>
            {wrap(<ScreenTree />)}
          </DCArtboard>
          <DCArtboard id="timeline" label="04 · Timeline" width={1100} height={720}>
            {wrap(<ScreenTimeline />)}
          </DCArtboard>
        </DCSection>

        {/* SECTION 5 — Fiche & édition */}
        <DCSection id="person" title="Fiche personne & édition" subtitle="Toujours en panneau latéral droit — l'arbre reste lisible derrière.">
          <DCArtboard id="panel" label="05 · Fiche personne (panneau)" width={1100} height={720}>
            {wrap(<ScreenPersonPanel />)}
          </DCArtboard>
          <DCArtboard id="edit" label="06 · Ajout / édition" width={1100} height={720}>
            {wrap(<ScreenAddEdit />)}
          </DCArtboard>
        </DCSection>

        {/* SECTION 6 — Outils */}
        <DCSection id="tools" title="Outils · Photos, Pistes, Recherche" subtitle="Le mur de souvenirs, l'IA bienveillante, et la palette ⌘K.">
          <DCArtboard id="photos" label="07 · Photos & Documents" width={1100} height={720}>
            {wrap(<ScreenPhotos />)}
          </DCArtboard>
          <DCArtboard id="hints" label="08 · Pistes (Hints)" width={1100} height={720}>
            {wrap(<ScreenHints />)}
          </DCArtboard>
          <DCArtboard id="search" label="09 · Recherche globale ⌘K" width={1100} height={720}>
            {wrap(<ScreenSearch />)}
          </DCArtboard>
        </DCSection>

        {/* SECTION 7 — Système */}
        <DCSection id="components" title="Composants atomiques & notes" subtitle="Vocabulaire visuel partagé, accessibilité, mobile à venir.">
          <DCArtboard id="comp" label="10 · Composants & accessibilité" width={1100} height={780}>
            {wrap(<ScreenComponents />)}
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks">
        <TweakSection label="Palette">
          <TweakRadio
            label="Couleurs"
            value={tweaks.palette}
            onChange={v => setTweak('palette', v)}
            options={[
              { value: 'gray', label: 'Gris' },
              { value: 'warm', label: 'Sépia' },
              { value: 'cool', label: 'Ardoise' },
              { value: 'dark', label: 'Sombre' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Carte personne">
          <TweakRadio
            label="Densité"
            value={tweaks.density}
            onChange={v => setTweak('density', v)}
            options={[
              { value: 'min', label: 'Minimal' },
              { value: 'med', label: 'Moyen' },
              { value: 'rich', label: 'Riche' },
            ]}
          />
        </TweakSection>
        <TweakSection label="Éventail">
          <TweakSlider
            label="Profondeur (générations)"
            min={3} max={6} step={1}
            value={tweaks.depth}
            onChange={v => setTweak('depth', v)}
          />
          <TweakToggle
            label="Annotations visibles"
            value={tweaks.showAnnotations}
            onChange={v => setTweak('showAnnotations', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
